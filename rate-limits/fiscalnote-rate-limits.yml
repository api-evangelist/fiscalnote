specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: FiscalNote
providerId: fiscalnote
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Government
  - Legislation
  - Policy
  - Political Intelligence
  - Regulation
  - Rate Limiting
description: FiscalNote does not publish numeric API rate limits. API access is bundled into enterprise subscriptions and throttling is set per customer agreement. Standard 429/503 conventions are expected; specifics are provided to customers in API onboarding documentation.
notes: No public rate-limit page. Limits are per-customer contract; this entry is an umbrella pointer.
sources:
  - https://www.fiscalnote.com/products
  - https://fiscalnote.com/policynote-plans
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-customer API throttle
    scope: customer/api-key
    metric: varies
    limit: per-customer agreement; not publicly published
    applies:
      - FiscalNote Bills & Legislation API
      - FiscalNote Regulations API
      - FiscalNote Stakeholder API
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429/5xx; honor Retry-After when present.
  - name: Bulk vs Real-time
    description: Bulk export endpoints typically have lower per-second limits than the read APIs; coordinate large extracts with the FiscalNote account team.
  - name: Subscription-Bound Access
    description: API keys are tied to a specific customer subscription tier; revoking the subscription deauthorizes API access.
maintainers: []
