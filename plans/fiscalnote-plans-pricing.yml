specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: FiscalNote
providerId: fiscalnote
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Government
  - Legislation
  - Policy
  - Political Intelligence
  - Regulation
description: FiscalNote sells policy-intelligence SaaS (PolicyNote, CQ, Roll Call, etc.) on annual contracts. The PolicyNote product page documents three tiers — Platform Only, Essential, and Advanced — but does not publish dollar pricing; all tiers route to "Request Pricing" or "Book a Demo". API access is bundled into customer subscriptions; there is no self-serve API plan.
notes: Plan names (Platform Only / Essential / Advanced) are confirmed from fiscalnote.com/policynote-plans, but no public dollar amounts are published. Quotas / rate limits / feature gating are reflected as "contact sales".
sources:
  - https://www.fiscalnote.com/products
  - https://fiscalnote.com/policynote-plans
plans:
  - id: fiscalnote-policynote-platform-only
    name: PolicyNote — Platform Only
    type: subscription
    description: Self-serve PolicyNote tier — comprehensive AI-powered U.S. state and federal policy monitoring with bill tracking, AI summaries, stakeholder database, reporting, and custom dashboard.
    entries:
      - label: Subscription
        description: Annual contract; pricing not publicly disclosed
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: US
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: US State & Federal Data
      - name: CQ News & Analysis
      - name: AI Assistant
      - name: AI Bill Summaries
      - name: Stakeholder Database
      - name: Reporting Tools
      - name: Custom Dashboard
  - id: fiscalnote-policynote-essential
    name: PolicyNote — Essential (Most Popular)
    type: subscription
    description: Adds curation and hands-on monitoring support from a FiscalNote policy analyst on top of Platform Only, with unlimited modules in every email digest.
    entries:
      - label: Subscription
        description: Annual contract; pricing not publicly disclosed
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: US
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: All Platform Only Features
      - name: Hands-On Analyst Curation
      - name: Unlimited Modules per Email
  - id: fiscalnote-policynote-advanced
    name: PolicyNote — Advanced
    type: subscription
    description: Adds Weekly Briefs — executive-summary reports with connected analysis on key issues — on top of Essential.
    entries:
      - label: Subscription
        description: Annual contract; pricing not publicly disclosed
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: US
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: All Essential Features
      - name: Weekly Briefs (Executive Summaries)
  - id: fiscalnote-enterprise-api
    name: Enterprise / API Access
    type: enterprise
    description: API access to FiscalNote data (bills, regulations, hearings, members, stakeholders) is bundled into enterprise subscriptions and not sold as a standalone API tier. Access provisioned via account team.
    entries:
      - label: API Access
        description: Bundled with enterprise subscription
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Bills & Legislation API
      - name: Regulations API
      - name: Stakeholder / People API
      - name: Hearings & Schedule API
      - name: Custom Data Feeds
maintainers: []
