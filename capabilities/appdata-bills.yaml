naftiko: 1.0.0-alpha2
info:
  label: FiscalNote AppData API — Bills
  description: 'FiscalNote AppData API — Bills. 2 operations. Lead operation: FiscalNote List bills. Self-contained Naftiko
    capability covering one Fiscalnote business surface.'
  tags:
  - Fiscalnote
  - Bills
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FISCALNOTE_API_KEY: FISCALNOTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: appdata-bills
    baseUri: https://api.fiscalnote.com
    description: FiscalNote AppData API — Bills business capability. Self-contained, no shared references.
    resources:
    - name: appdata-v1-bills
      path: /appdata/v1/bills
      operations:
      - name: listbills
        method: GET
        description: FiscalNote List bills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-bills-billId
      path: /appdata/v1/bills/{billId}
      operations:
      - name: getbill
        method: GET
        description: FiscalNote Get bill by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: billId
          in: path
          type: string
          description: The unique identifier of the bill.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.FISCALNOTE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: appdata-bills-rest
    port: 8080
    description: REST adapter for FiscalNote AppData API — Bills. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/appdata/v1/bills
      name: appdata-v1-bills
      description: REST surface for appdata-v1-bills.
      operations:
      - method: GET
        name: listbills
        description: FiscalNote List bills
        call: appdata-bills.listbills
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/appdata/v1/bills/{billid}
      name: appdata-v1-bills-billid
      description: REST surface for appdata-v1-bills-billId.
      operations:
      - method: GET
        name: getbill
        description: FiscalNote Get bill by ID
        call: appdata-bills.getbill
        with:
          billId: rest.billId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appdata-bills-mcp
    port: 9090
    transport: http
    description: MCP adapter for FiscalNote AppData API — Bills. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: fiscalnote-list-bills
      description: FiscalNote List bills
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appdata-bills.listbills
      outputParameters:
      - type: object
        mapping: $.
    - name: fiscalnote-get-bill-id
      description: FiscalNote Get bill by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appdata-bills.getbill
      with:
        billId: tools.billId
      outputParameters:
      - type: object
        mapping: $.
