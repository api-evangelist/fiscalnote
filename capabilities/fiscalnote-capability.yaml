naftiko: 1.0.0-alpha2
info:
  label: FiscalNote AppData API
  description: The FiscalNote AppData API provides access to FiscalNote's data on legislation and regulations, both past and
    present, in the United States and globally. It also exposes organizational data from the FiscalNote platform including
    issues and labels. Developers can use the API to integrate legislative tracking, regulatory monitoring, and policy analysis
    capabilities into their own applications and workflows.
  tags:
  - Fiscalnote
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: fiscalnote
    baseUri: https://api.fiscalnote.com
    description: FiscalNote AppData API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{FISCALNOTE_TOKEN}}'
    resources:
    - name: appdata-v1-bills
      path: /appdata/v1/bills
      operations:
      - name: listbills
        method: GET
        description: FiscalNote List bills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-bills-billid
      path: /appdata/v1/bills/{billId}
      operations:
      - name: getbill
        method: GET
        description: FiscalNote Get bill by ID
        inputParameters:
        - name: billId
          in: path
          type: string
          required: true
          description: The unique identifier of the bill.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-issues
      path: /appdata/v1/issues
      operations:
      - name: listissues
        method: GET
        description: FiscalNote List issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-issues-issueid
      path: /appdata/v1/issues/{issueId}
      operations:
      - name: getissue
        method: GET
        description: FiscalNote Get issue by ID
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
          description: The unique identifier of the issue.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-labels
      path: /appdata/v1/labels
      operations:
      - name: listlabels
        method: GET
        description: FiscalNote List labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-labels-labelid
      path: /appdata/v1/labels/{labelId}
      operations:
      - name: getlabel
        method: GET
        description: FiscalNote Get label by ID
        inputParameters:
        - name: labelId
          in: path
          type: string
          required: true
          description: The unique identifier of the label.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-regulatory-documents
      path: /appdata/v1/regulatory-documents
      operations:
      - name: listregulatorydocuments
        method: GET
        description: FiscalNote List regulatory documents
        inputParameters:
        - name: agency
          in: query
          type: string
          description: Filter by issuing agency name or identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: appdata-v1-regulatory-documents-documentid
      path: /appdata/v1/regulatory-documents/{documentId}
      operations:
      - name: getregulatorydocument
        method: GET
        description: FiscalNote Get regulatory document by ID
        inputParameters:
        - name: documentId
          in: path
          type: string
          required: true
          description: The unique identifier of the regulatory document.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: fiscalnote-rest
    description: REST adapter for FiscalNote AppData API.
    resources:
    - path: /appdata/v1/bills
      name: listbills
      operations:
      - method: GET
        name: listbills
        description: FiscalNote List bills
        call: fiscalnote.listbills
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/bills/{billId}
      name: getbill
      operations:
      - method: GET
        name: getbill
        description: FiscalNote Get bill by ID
        call: fiscalnote.getbill
        with:
          billId: rest.billId
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/issues
      name: listissues
      operations:
      - method: GET
        name: listissues
        description: FiscalNote List issues
        call: fiscalnote.listissues
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/issues/{issueId}
      name: getissue
      operations:
      - method: GET
        name: getissue
        description: FiscalNote Get issue by ID
        call: fiscalnote.getissue
        with:
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/labels
      name: listlabels
      operations:
      - method: GET
        name: listlabels
        description: FiscalNote List labels
        call: fiscalnote.listlabels
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/labels/{labelId}
      name: getlabel
      operations:
      - method: GET
        name: getlabel
        description: FiscalNote Get label by ID
        call: fiscalnote.getlabel
        with:
          labelId: rest.labelId
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/regulatory-documents
      name: listregulatorydocuments
      operations:
      - method: GET
        name: listregulatorydocuments
        description: FiscalNote List regulatory documents
        call: fiscalnote.listregulatorydocuments
        outputParameters:
        - type: object
          mapping: $.
    - path: /appdata/v1/regulatory-documents/{documentId}
      name: getregulatorydocument
      operations:
      - method: GET
        name: getregulatorydocument
        description: FiscalNote Get regulatory document by ID
        call: fiscalnote.getregulatorydocument
        with:
          documentId: rest.documentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: fiscalnote-mcp
    transport: http
    description: MCP adapter for FiscalNote AppData API for AI agent use.
    tools:
    - name: listbills
      description: FiscalNote List bills
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.listbills
      outputParameters:
      - type: object
        mapping: $.
    - name: getbill
      description: FiscalNote Get bill by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.getbill
      with:
        billId: tools.billId
      inputParameters:
      - name: billId
        type: string
        description: The unique identifier of the bill.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listissues
      description: FiscalNote List issues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.listissues
      outputParameters:
      - type: object
        mapping: $.
    - name: getissue
      description: FiscalNote Get issue by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.getissue
      with:
        issueId: tools.issueId
      inputParameters:
      - name: issueId
        type: string
        description: The unique identifier of the issue.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listlabels
      description: FiscalNote List labels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.listlabels
      outputParameters:
      - type: object
        mapping: $.
    - name: getlabel
      description: FiscalNote Get label by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.getlabel
      with:
        labelId: tools.labelId
      inputParameters:
      - name: labelId
        type: string
        description: The unique identifier of the label.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listregulatorydocuments
      description: FiscalNote List regulatory documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.listregulatorydocuments
      with:
        agency: tools.agency
      inputParameters:
      - name: agency
        type: string
        description: Filter by issuing agency name or identifier.
      outputParameters:
      - type: object
        mapping: $.
    - name: getregulatorydocument
      description: FiscalNote Get regulatory document by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fiscalnote.getregulatorydocument
      with:
        documentId: tools.documentId
      inputParameters:
      - name: documentId
        type: string
        description: The unique identifier of the regulatory document.
        required: true
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    FISCALNOTE_TOKEN: FISCALNOTE_TOKEN
