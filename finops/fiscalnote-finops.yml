specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: FiscalNote
providerId: fiscalnote
publisherName: FiscalNote, Inc.
serviceCategory: Government / Policy Intelligence
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Government
  - Legislation
  - Policy
  - Political Intelligence
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps mapping for FiscalNote — annual subscription SaaS with seat-based and tier-gated pricing across PolicyNote, CQ, and Roll Call products. API access is bundled with the subscription rather than separately metered.
notes: No public pricing or invoice schema; meters reflect the expected invoice lines (seat-month, tier license, professional-services analyst hours).
sources:
  - https://www.fiscalnote.com/products
  - https://fiscalnote.com/policynote-plans
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: FiscalNote
  ServiceCategory: Government / Policy Intelligence
  ProviderName: FiscalNote, Inc.
  PublisherName: FiscalNote, Inc.
  InvoiceIssuerName: FiscalNote, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: seats
    description: Named-user seats on PolicyNote / CQ / Roll Call
    unit: seat-month
    aggregation: max
    dimensions:
      - product
      - tier
      - team
  - name: tier_license
    description: Tier license fee (Platform Only / Essential / Advanced) on PolicyNote
    unit: month
    aggregation: max
    dimensions:
      - product
      - tier
  - name: analyst_services
    description: Hands-on analyst curation hours bundled with Essential / Advanced tiers
    unit: hour
    aggregation: sum
    dimensions:
      - product
      - tier
  - name: api_calls
    description: Optional API usage where contract specifies a metered API add-on
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
principles:
  - name: Visibility
    description: Pull seat-utilization reports from FiscalNote admin to track license waste; reconcile against the annual invoice.
  - name: Allocation
    description: Allocate seats by team/issue area in the FiscalNote admin so chargeback is unambiguous.
  - name: Optimization
    description: Right-size tier (Platform Only vs Essential) based on whether analyst curation is actually consumed; consolidate seats from departing employees promptly.
  - name: Accountability
    description: Government-affairs leader owns the contract; finance reviews seat utilization and tier appropriateness ahead of each annual renewal.
maintainers: []
